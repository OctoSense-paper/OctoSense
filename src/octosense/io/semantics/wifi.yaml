  octo.wifi.field.rssi_b:
    code: RSSI_B
    preferred_name: rssi_b
    category: signal_strength
    status: stable
    description: Receive signal strength for chain B.
  octo.wifi.field.rssi_c:
    code: RSSI_C
    preferred_name: rssi_c
    category: signal_strength
    status: stable
