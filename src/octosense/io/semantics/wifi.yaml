axes:
  octo.wifi.axis.subc:
    code: SUBC
    preferred_name: subc
    unit: index
    category: frequency_bin
    status: stable
    aliases: [subcarrier]
    description: OFDM subcarrier axis for WiFi CSI.
fields:
  octo.wifi.field.channel:
    code: CHANNEL
    preferred_name: channel
    category: rf_channel
    status: stable
    description: IEEE 802.11 channel number used for the capture.
  octo.wifi.field.subcarrier_spacing:
    code: SUBCARRIER_SPACING
    preferred_name: subcarrier_spacing
    category: physical_quantity
    unit: Hz
    status: stable
    aliases: [subcarrier_spacing_hz]
    description: Spacing between adjacent CSI subcarriers in Hz.
  vendor.atheros.field.timestamp_raw:
    code: ATH_TIMESTAMP_RAW
    preferred_name: atheros_timestamp_raw
    category: timing_metadata
    unit: tick
    status: vendor_extension
    source_namespace: vendor.atheros
    description: Raw Atheros packet timestamp counter before conversion into canonical seconds.
  vendor.iwl5300.field.timestamp_low:
    code: IWL5300_TIMESTAMP_LOW
    preferred_name: iwl5300_timestamp_low
    category: timing_metadata
    unit: tick
    status: vendor_extension
    source_namespace: vendor.iwl5300
    description: Raw Intel 5300 timestamp counter before conversion into canonical seconds.
  vendor.iwlmvm.field.timestamp_nano:
    code: IWLMVM_TIMESTAMP_NANO
    preferred_name: iwlmvm_timestamp_nano
    category: timing_metadata
    unit: ns
    status: vendor_extension
    source_namespace: vendor.iwlmvm
