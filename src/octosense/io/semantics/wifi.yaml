tensors:
  octo.wifi.tensor.csi:
    code: DATA
    preferred_name: csi
    category: raw_signal
    dtype: complex64
    status: stable
    aliases: [data]
    axis_semantics:
      - octo.common.axis.time
      - octo.wifi.axis.subc
      - octo.common.axis.tx
      - octo.common.axis.rx
    description: Canonical WiFi CSI tensor.
provenance:
  octo.wifi.provenance.device_type:
    code: DEVICE_TYPE
    preferred_name: device_type
    category: device_identity
    status: stable
    description: Hardware device-type label emitted by the capture tool.
representation:
  octo.wifi.representation.dimension_names:
    code: DIMENSION_NAMES
    preferred_name: dimension_names
    category: layout_metadata
    status: stable
    description: Ordered signal-dimension labels exported by a reader-side packet parser.
  octo.wifi.representation.data_format:
    code: DATA_FORMAT
    preferred_name: data_format
    category: layout_metadata
    status: stable
    description: Reader-declared data layout or numeric packing description for the CSI payload.
