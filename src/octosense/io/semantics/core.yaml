    category: identifier
    status: stable
    description: Canonical OctoSense reader identity string.
  octo.common.provenance.capture_device:
    code: CAPTURE_DEVICE
    preferred_name: capture_device
    category: identifier
    status: stable
    description: Hardware family that produced the capture.
